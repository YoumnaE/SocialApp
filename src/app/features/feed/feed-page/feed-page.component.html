<div class="grid grid-cols-12 gap-5 p-5">
    <div class="col-span-3">
        <app-feed-side-bar/>
    </div>
    <div class="col-span-6">
        <app-add-posts (sendAddedPostToParent)="allPosts.unshift($event)"/>
        @if (allPosts) {
            <app-all-posts (postDeleted)="removePost($event)" [allPosts]="allPosts"/>
        }@else {
            <p class="mt-8 text-gray-400 text-center">Loading <i class="fas fa-spinner fa-spin"></i></p>
        }

        @if(allPosts && isLoading){
            <div class="text-center my-6 text-gray-400">
                Loading more posts <i class="fas fa-spinner fa-spin"></i>
            </div>
        }
    </div>
    <div class="col-span-3">
        <div class="mx-auto bg-white p-2 rounded shadow lg:w-3/4">
            <h2 class="font-bold text-center border-b border-gray-200 py-2 mb-2">Suggested</h2>
            @for (user of allFollowSuggestions; track user._id) {
                <app-feed-suggested-friends (refreshView)="getFollowSuggestions()" [suggestion]="user" />
            }@empty{
                <div class="col-span-full text-center py-10 text-gray-500">No suggestions found</div>
            }
        </div>
    </div>
</div>
<div
      class="search-results"
      infiniteScroll
      [infiniteScrollDistance]="2"
      [infiniteScrollThrottle]="50"
      (scrolled)="onScroll()"
    ></div>
